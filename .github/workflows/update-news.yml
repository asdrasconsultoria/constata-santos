name: Update News
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install deps
        run: npm install rss-parser --no-audit --no-fund --prefer-offline
        
      - name: Fetch
        run: node scripts/fetch-news.js
        
      - name: Commit
        run: |
          git config user.name "bot"
          git config user.email "bot@bot.com"
          git add noticias.json
          git diff --staged --quiet || (git commit -m "update [skip ci]" && git push)
